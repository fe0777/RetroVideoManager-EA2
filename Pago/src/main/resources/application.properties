spring.application.name=Pago

server.port=8084

# Configuración de la base de datos
spring.datasource.url=jdbc:mysql://localhost:3306/Pago_db
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# URLs de otros servicios
services.autenticacion.url=http://localhost:8081
services.peliculas.url=http://localhost:8083
services.usuarios.url=http://localhost:8082
