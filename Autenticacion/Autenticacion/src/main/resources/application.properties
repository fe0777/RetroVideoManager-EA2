spring.application.name=Autenticacion

server.port=8081

# Configuración de la base de datos
spring.datasource.url=jdbc:mysql://localhost:3306/autenticacion_db
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

Eureka.client.service-url.default=http://localhost:8081/eureka/

# Configuración de JWT
jwt.secret=clave-secreta-muy-larga-para-firmar-tokens-jwt-proyecto-fullstack-2026.2
jwt.expiration=3600000
eureka.client.enabled=false

# URL del servicio Usuarios
services.usuarios.url=http://localhost:8082


springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html