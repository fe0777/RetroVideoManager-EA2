spring:
  application:
    name: Autenticacion
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/autenticacion_db}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: 8081

jwt:
  secret: clave-secreta-muy-larga-para-firmar-tokens-jwt-proyecto-fullstack-2026.2
  expiration: 3600000

eureka:
  client:
    enabled: false

services:
  usuarios:
    url: ${SERVICES_USUARIOS_URL:http://localhost:8082}

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /doc/swagger-ui.html
